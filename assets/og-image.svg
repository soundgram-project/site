<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08080e"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="300" fill="#9333ea" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="1000" cy="430" r="250" fill="#ec4899" opacity="0.12" filter="url(#blur1)"/>
  <!-- Logo circle -->
  <circle cx="600" cy="220" r="56" fill="url(#grad)"/>
  <path d="M585 254V230l24-7v24" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="581" cy="254" r="5.5" fill="white"/>
  <circle cx="609" cy="247" r="5.5" fill="white"/>
  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="68" font-weight="900" fill="white">SoundGram</text>
  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="rgba(240,240,248,0.55)">Telegram-клиент для любителей музыки</text>
  <!-- Tags -->
  <rect x="390" y="430" width="140" height="38" rx="19" fill="rgba(147,51,234,0.18)" stroke="rgba(147,51,234,0.4)" stroke-width="1"/>
  <text x="460" y="454" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c084fc">Эквалайзер</text>
  <rect x="550" y="430" width="160" height="38" rx="19" fill="rgba(147,51,234,0.18)" stroke="rgba(147,51,234,0.4)" stroke-width="1"/>
  <text x="630" y="454" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c084fc">Тексты песен</text>
  <rect x="730" y="430" width="130" height="38" rx="19" fill="rgba(147,51,234,0.18)" stroke="rgba(147,51,234,0.4)" stroke-width="1"/>
  <text x="795" y="454" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c084fc">Моя волна</text>
